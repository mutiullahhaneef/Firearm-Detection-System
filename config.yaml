
# ─────────────────────────────────────────────
#  Firearm Detection — Training Configuration
#  Optimized for low-VRAM GPUs and CPUs
# ─────────────────────────────────────────────

model:   yolov8n.pt   # nano model — fastest & lightest
data:    dataset/dataset.yaml
epochs:  100
imgsz:   416          # 416 = good speed/accuracy balance (use 320 for very low-end)
batch:   8            # reduce to 4 if VRAM < 4GB
workers: 2            # reduce to 0 on Windows if errors occur
device:  ""           # "" = auto-select GPU if available, else CPU

# Performance
amp:     true         # Automatic Mixed Precision — saves ~40% VRAM
freeze:  10           # freeze first 10 backbone layers (faster fine-tuning)
cache:   false        # set to "ram" if dataset fits in memory

# Optimizer
optimizer: AdamW
lr0:     0.001
lrf:     0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0

# Augmentation (keep light — firearm shapes shouldn't be distorted heavily)
hsv_h:   0.015
hsv_s:   0.7
hsv_v:   0.4
degrees: 5.0          # small rotation only
translate: 0.1
scale:   0.5
flipud:  0.0          # don't flip vertically (guns shouldn't be upside down)
fliplr:  0.5
mosaic:  1.0
mixup:   0.0

# Output
project: runs/train
name:    firearm_multiclass
exist_ok: true
save:    true
plots:   true
